<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>AMUL Recharge</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f3f5ff; padding-bottom:120px; overflow-x:hidden; }

.header { height:65px; background:linear-gradient(90deg,#e61e2a,#ff4b5c); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:22px; position:sticky; top:0; z-index:1000; box-shadow:0 5px 20px rgba(0,0,0,.15); }

.hero { background:linear-gradient(180deg,#e61e2a 0%,#ff6b6b 100%); padding:30px 20px 55px; border-bottom-left-radius:35px; border-bottom-right-radius:35px; color:#fff; text-align:center; position:relative; overflow:hidden; }
.hero::before { content:""; position:absolute; width:250px; height:250px; background:rgba(255,255,255,.08); border-radius:50%; top:-100px; right:-80px; }
.hero p { font-size:14px; opacity:.9; }
.hero h1 { margin-top:10px; font-size:38px; font-weight:900; }

.card { background:#fff; margin:-30px 15px 15px; border-radius:28px; padding:20px; box-shadow:0 15px 35px rgba(0,0,0,.08); position:relative; z-index:5; }
.title { font-size:16px; font-weight:900; color:#222; margin-bottom:15px; }

.amount-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.amount-btn { background:#f5f7ff; border:2px solid #edf0ff; height:60px; border-radius:18px; font-weight:900; font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s; }
.amount-btn.active { background:#e61e2a; color:#fff; border-color:#e61e2a; transform:scale(.96); }

.input-box { width:100%; height:58px; border:none; background:#f5f7ff; border-radius:18px; padding:0 18px; font-size:17px; font-weight:800; outline:none; margin-bottom:18px; }
.main-btn { width:100%; height:58px; border:none; background:linear-gradient(90deg,#e61e2a,#ff4b5c); color:#fff; font-size:17px; font-weight:900; border-radius:18px; cursor:pointer; box-shadow:0 8px 20px rgba(230,30,42,.3); }

.page { position:fixed; top:0; left:100%; width:100%; height:100%; background:#f3f5ff; z-index:1500; transition:.35s; overflow-y:auto; padding-bottom:120px; }
.page.active { left:0; }

.topbar { height:65px; background:#fff; display:flex; align-items:center; padding:0 18px; font-size:18px; font-weight:900; box-shadow:0 3px 10px rgba(0,0,0,.05); position:sticky; top:0; z-index:100; }
.back-btn { width:42px; height:42px; border-radius:12px; background:#f5f7ff; display:flex; align-items:center; justify-content:center; margin-right:12px; cursor:pointer; }

.channel-wrap { padding:18px; }
.channel-btn { background:#fff; border-radius:20px; padding:18px; margin-bottom:15px; display:flex; align-items:center; font-weight:800; font-size:16px; box-shadow:0 8px 25px rgba(0,0,0,.05); cursor:pointer; }
.channel-btn i { font-size:22px; margin-right:14px; color:#e61e2a; }

.payment-box { background:#fff; margin-top:20px; padding:18px; border-radius:22px; box-shadow:0 8px 25px rgba(0,0,0,.05); display:none; }
.info-item { background:#f5f7ff; padding:15px; border-radius:16px; margin-bottom:12px; font-size:14px; font-weight:800; word-break:break-all; }
.qr-image { width:100%; border-radius:20px; margin-bottom:15px; }
.utr-input, .promo-input { width:100%; height:58px; border:none; background:#f5f7ff; border-radius:16px; padding:0 16px; font-size:16px; font-weight:800; margin-bottom:15px; outline:none; }

.popup { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#16a34a; color:#fff; padding:14px 20px; border-radius:14px; font-weight:800; display:none; z-index:99999; box-shadow:0 10px 25px rgba(0,0,0,.2); }

.history { margin:15px; }
.history-card { background:#fff; border-radius:22px; padding:16px; margin-bottom:14px; box-shadow:0 8px 20px rgba(0,0,0,.05); }
.status { margin-top:10px; display:inline-block; padding:6px 13px; border-radius:30px; font-size:12px; font-weight:900; text-transform:uppercase; }
.pending { background:#fff3cd; color:#856404; }
.success { background:#d4edda; color:#155724; }
.rejected { background:#f8d7da; color:#721c24; }

.bottom-nav { position:fixed; bottom:0; left:0; width:100%; height:62px; background:white; display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid #f0f0f0; z-index:999999; box-shadow:0 -3px 10px rgba(0,0,0,.05); }
.nav-link { display:flex; flex-direction:column; align-items:center; justify-content:center; text-decoration:none; color:#b2bec3; font-size:10px; font-weight:700; }
.nav-link img { width:22px; height:22px; margin-bottom:3px; }
</style>
</head>

<body>

<div class="popup" id="popup">Success</div>

<div class="header">AMUL Recharge</div>

<div class="hero">
    <p>Main Wallet Balance</p>
    <h1 id="walletBalance">₹0</h1>
</div>

<div class="card">
    <div class="title">Select Amount</div>
    <div class="amount-grid" id="amountGrid"></div>
    <input type="number" id="customAmount" class="input-box" placeholder="Enter Amount">
    <button class="main-btn" onclick="openDepositPage()">Deposit Now</button>
</div>

<!-- DEPOSIT PAGE -->
<div class="page" id="depositPage">
    <div class="topbar">
        <div class="back-btn" onclick="closeDepositPage()"><i class="fa fa-arrow-left"></i></div>
        Deposit Money
    </div>
    <div class="channel-wrap">
        <div class="channel-btn" onclick="selectChannel('bank')"><i class="fa fa-building-columns"></i> Bank Transfer</div>
        <div class="channel-btn" onclick="selectChannel('upi')"><i class="fa fa-wallet"></i> UPI Payment</div>
        <div class="channel-btn" onclick="selectChannel('qr')"><i class="fa fa-qrcode"></i> QR Payment</div>
        <div class="channel-btn" onclick="selectChannel('promo')"><i class="fa fa-gift"></i> Promocode</div>
        <div class="payment-box" id="paymentInfo"></div>
    </div>
</div>

<!-- HISTORY -->
<div class="history">
    <div class="title">Recharge History</div>
    <div id="historyList"></div>
</div>

<!-- NAVBAR -->
<nav class="bottom-nav">
    <a href="https://sawanpoint0000-dev.github.io/logind/" class="nav-link"><img src="https://img.icons8.com/material-rounded/48/b2bec3/home.png"><span>Home</span></a>
    <a href="https://sawanpoint0000-dev.github.io/fands/" class="nav-link"><img src="https://img.icons8.com/material-rounded/48/b2bec3/bank-safe.png"><span>Fund</span></a>
    <a href="https://sawanpoint0000-dev.github.io/team/" class="nav-link"><img src="https://img.icons8.com/material-rounded/48/b2bec3/conference-call.png"><span>Team</span></a>
    <a href="https://sawanpoint0000-dev.github.io/mines/" class="nav-link"><img src="https://img.icons8.com/material-rounded/48/b2bec3/user-male-circle.png"><span>Mine</span></a>
</nav>

<script>
// ==================== CONFIG ====================
const PROXY_URL = "https://fjseur.sawanenter7209.workers.dev";
let currentPhone = localStorage.getItem("phone") || "user_" + Math.floor(Math.random()*99999999);
localStorage.setItem("phone", currentPhone);

let selectedAmount = 0;
let selectedChannel = "";

// ==================== PROXY FUNCTIONS ====================
async function proxyRequest(endpoint, method = "GET", body = null) {
    try {
        const options = { method, headers: { "Content-Type": "application/json" }};
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(PROXY_URL + endpoint, options);
        if (!res.ok) throw new Error();
        const text = await res.text();
        return text ? JSON.parse(text) : null;
    } catch (e) { return null; }
}

async function getData(path) { return await proxyRequest("/db/" + path); }
async function setData(path, data) { return await proxyRequest("/db/" + path, "PUT", data); }
async function pushData(path, data) { return await proxyRequest("/db/" + path, "POST", data); }

// ==================== POPUP ====================
function showPopup(text) {
    const popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";
    setTimeout(() => popup.style.display = "none", 2800);
}

// ==================== AMOUNT GRID ====================
const settings = { amounts: [100,200,500,1000,5000,10000] };
const amountGrid = document.getElementById("amountGrid");
settings.amounts.forEach(amount => {
    amountGrid.innerHTML += `<div class="amount-btn" onclick="selectAmount(this,${amount})">₹${amount}</div>`;
});

window.selectAmount = function(el, amount) {
    selectedAmount = amount;
    document.getElementById("customAmount").value = amount;
    document.querySelectorAll(".amount-btn").forEach(btn => btn.classList.remove("active"));
    el.classList.add("active");
};

// ==================== DEPOSIT PAGE ====================
window.openDepositPage = function() {
    let amount = document.getElementById("customAmount").value;
    if (!amount || Number(amount) <= 0) return showPopup("Enter Valid Amount");
    selectedAmount = Number(amount);
    document.getElementById("depositPage").classList.add("active");
};

window.closeDepositPage = function() {
    document.getElementById("depositPage").classList.remove("active");
};

window.selectChannel = function(type) {
    selectedChannel = type;
    let html = "";

    if (type === "bank") {
        html = `<div class="title">Bank Details</div>
                <div class="info-item">Bank Name : State Bank Of India</div>
                <div class="info-item">Account No : 1234567890</div>
                <div class="info-item">IFSC : SBIN0001234</div>`;
    } else if (type === "upi") {
        html = `<div class="title">UPI Details</div>
                <div class="info-item">UPI ID : amul@paytm</div>`;
    } else if (type === "qr") {
        html = `<div class="title">Scan QR</div>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=AMUL-DEMO" class="qr-image">`;
    } else if (type === "promo") {
        html = `<div class="title">Enter Promocode</div>
                <input type="text" id="promoInput" class="promo-input" placeholder="Enter Promocode">
                <button class="main-btn" onclick="applyPromoCode()">Apply Promocode</button>`;
    }

    if (type !== "promo") {
        html += `<input type="number" id="utrInput" class="utr-input" placeholder="Enter 12 Digit UTR">
                 <button class="main-btn" onclick="submitUTR()">Submit UTR</button>`;
    }

    document.getElementById("paymentInfo").innerHTML = html;
    document.getElementById("paymentInfo").style.display = "block";
};

// ==================== SUBMIT UTR ====================
window.submitUTR = async function() {
    let utr = document.getElementById("utrInput").value.trim();
    if (!/^[0-9]{12}$/.test(utr)) return showPopup("Invalid UTR");

    await pushData("depositRequests", {
        phone: currentPhone,
        amount: selectedAmount,
        channel: selectedChannel,
        utr: utr,
        status: "pending",
        time: new Date().toLocaleString(),
        processed: false
    });

    showPopup("Request Submitted (Pending)");
    document.getElementById("utrInput").value = "";
    closeDepositPage();
};

// ==================== PROMOCODE ====================
window.applyPromoCode = async function() {
    const code = document.getElementById("promoInput").value.trim().toUpperCase();
    if (!code) return showPopup("Enter Promocode");

    const promocodes = await getData("promocodes") || {};
    let found = null;

    for (let key in promocodes) {
        if (promocodes[key].code === code && promocodes[key].active) {
            found = promocodes[key];
            break;
        }
    }

    if (!found) return showPopup("Invalid or Expired Promocode");

    // Add amount to wallet
    let balance = Number(await getData("demoWallet/" + currentPhone) || 0);
    await setData("demoWallet/" + currentPhone, balance + found.amount);

    showPopup(`✅ ₹${found.amount} Added via Promocode!`);
    document.getElementById("promoInput").value = "";
    closeDepositPage();
};

// ==================== AUTO WALLET UPDATE ON SUCCESS ====================
function listenDeposits() {
    setInterval(async () => {
        const requests = await getData("depositRequests") || {};
        for (let key in requests) {
            const req = requests[key];
            if (req.phone === currentPhone && 
                req.status === "success" && 
                req.processed !== true) {

                let balance = Number(await getData("demoWallet/" + currentPhone) || 0);
                await setData("demoWallet/" + currentPhone, balance + Number(req.amount));
                await setData(`depositRequests/${key}/processed`, true);

                showPopup(`₹${req.amount} Added to Wallet!`);
            }
        }
    }, 4000);
}

// ==================== LIVE WALLET ====================
function listenWallet() {
    setInterval(async () => {
        let balance = Number(await getData("demoWallet/" + currentPhone) || 0);
        document.getElementById("walletBalance").innerText = "₹" + balance;
    }, 3000);
}

// ==================== HISTORY ====================
function listenHistory() {
    setInterval(async () => {
        const requests = await getData("depositRequests") || {};
        const container = document.getElementById("historyList");
        container.innerHTML = "";

        Object.keys(requests).reverse().forEach(key => {
            const data = requests[key];
            if (data.phone === currentPhone) {
                container.innerHTML += `
                <div class="history-card">
                    <b style="font-size:20px;">₹${data.amount}</b>
                    <div style="margin-top:8px;">Channel : ${data.channel.toUpperCase()}</div>
                    <div style="margin-top:8px;font-size:13px;color:#666;">UTR/Code : ${data.utr || data.code || 'N/A'}</div>
                    <div style="margin-top:8px;font-size:12px;color:#999;">${data.time}</div>
                    <div class="status ${data.status}">${data.status}</div>
                </div>`;
            }
        });
    }, 4000);
}

// ==================== INIT ====================
listenWallet();
listenDeposits();
listenHistory();
</script>
</body>
</html>
